        stroke="url(#fa-amber)" stroke-width="3.6"
        fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 2 tiny sprocket dots for texture -->
  <circle cx="14.5" cy="6.5" r="0.6" fill="#16140f"/>
  <circle cx="19.5" cy="6.5" r="0.6" fill="#16140f"/>
  <circle cx="9.5" cy="11" r="0.55" fill="#16140f"/>
  <circle cx="11" cy="20" r="0.55" fill="#16140f"/>
