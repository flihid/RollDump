<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="RollDump">
  <defs>
    <!-- Amber front: hot top edge, deep shadow at base -->
    <linearGradient id="rd-amber" x1="0.2" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#ffd078"/>
      <stop offset="35%" stop-color="#f5a623"/>
      <stop offset="78%" stop-color="#c66c00"/>
      <stop offset="100%" stop-color="#7a3e00"/>
    </linearGradient>
    <!-- Cream underside / inside of the loop -->
    <linearGradient id="rd-cream" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbeec7"/>
      <stop offset="55%" stop-color="#e6cf94"/>
      <stop offset="100%" stop-color="#a48149"/>
    </linearGradient>
    <!-- Soft highlight running across the top fold -->
    <linearGradient id="rd-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- Inner shadow for the cream loop hole -->
    <radialGradient id="rd-hole" cx="0.5" cy="0.3" r="0.7">
      <stop offset="0%" stop-color="#000000" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- Drop shadow under the whole roll -->
    <filter id="rd-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" in="SourceAlpha"/>
      <feOffset dx="0" dy="6"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g filter="url(#rd-shadow)">
    <!-- ── CREAM LOOP (back layer, the lower coil) ── -->
    <g>
      <!-- Outer ellipse (cream tape body) -->
      <ellipse cx="128" cy="180" rx="78" ry="34" fill="url(#rd-cream)"/>
      <!-- Inner hole, cut by stacking a darker ellipse -->
      <ellipse cx="128" cy="178" rx="52" ry="18" fill="#1a1410"/>
      <ellipse cx="128" cy="178" rx="52" ry="18" fill="url(#rd-hole)"/>
      <!-- Sprocket holes (top edge of cream loop) -->
      <g fill="#1a1410">
        <rect x="62" y="153" width="5" height="3" rx="0.6"/>
        <rect x="74" y="150" width="5" height="3" rx="0.6"/>
        <rect x="88" y="148" width="5" height="3" rx="0.6"/>
        <rect x="102" y="147" width="5" height="3" rx="0.6"/>
        <rect x="116" y="146.5" width="5" height="3" rx="0.6"/>
        <rect x="131" y="146.5" width="5" height="3" rx="0.6"/>
        <rect x="146" y="147" width="5" height="3" rx="0.6"/>
        <rect x="160" y="148" width="5" height="3" rx="0.6"/>
        <rect x="174" y="150" width="5" height="3" rx="0.6"/>
        <rect x="186" y="153" width="5" height="3" rx="0.6"/>
      </g>
      <!-- Sprocket holes (bottom edge) -->
      <g fill="#1a1410">
        <rect x="62" y="205" width="5" height="3" rx="0.6"/>
        <rect x="74" y="208" width="5" height="3" rx="0.6"/>
        <rect x="88" y="210" width="5" height="3" rx="0.6"/>
        <rect x="102" y="211.5" width="5" height="3" rx="0.6"/>
        <rect x="116" y="212" width="5" height="3" rx="0.6"/>
        <rect x="131" y="212" width="5" height="3" rx="0.6"/>
        <rect x="146" y="211.5" width="5" height="3" rx="0.6"/>
        <rect x="160" y="210" width="5" height="3" rx="0.6"/>
        <rect x="174" y="208" width="5" height="3" rx="0.6"/>
        <rect x="186" y="205" width="5" height="3" rx="0.6"/>
      </g>
      <!-- Frame indicator (small slit along center) -->
      <rect x="120" y="177.5" width="16" height="1" fill="#8a6630" opacity="0.65"/>
    </g>

    <!-- ── AMBER LOOP (front, the upper curl coming over the back) ── -->
    <g>
      <!-- The curl: a tape that loops up, over, and down behind -->
      <path d="M 78,184
               C 56,184 50,150 70,110
               C 90,68 138,52 172,72
               C 200,88 198,118 178,130
               C 162,140 138,134 130,118
               C 124,104 134,90 152,92
               C 168,94 174,108 168,118"
            stroke="url(#rd-amber)" stroke-width="26"
            fill="none" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Sprocket holes along the curl edges -->
      <g fill="#1a1410">
        <!-- Outer-top edge sprockets following the curl -->
        <rect x="70" y="92" width="3" height="5" rx="0.6" transform="rotate(-50 71.5 94.5)"/>
        <rect x="83" y="78" width="3" height="5" rx="0.6" transform="rotate(-35 84.5 80.5)"/>
        <rect x="99" y="68" width="3" height="5" rx="0.6" transform="rotate(-20 100.5 70.5)"/>
        <rect x="117" y="62" width="3" height="5" rx="0.6" transform="rotate(-8 118.5 64.5)"/>
        <rect x="135" y="60" width="3" height="5" rx="0.6"/>
        <rect x="151" y="62" width="3" height="5" rx="0.6" transform="rotate(10 152.5 64.5)"/>
        <rect x="166" y="68" width="3" height="5" rx="0.6" transform="rotate(22 167.5 70.5)"/>
        <rect x="180" y="78" width="3" height="5" rx="0.6" transform="rotate(38 181.5 80.5)"/>
        <!-- Inner-bottom edge sprockets along return strand -->
        <rect x="96" y="120" width="3" height="5" rx="0.6" transform="rotate(-40 97.5 122.5)"/>
        <rect x="110" y="108" width="3" height="5" rx="0.6" transform="rotate(-20 111.5 110.5)"/>
        <rect x="128" y="102" width="3" height="5" rx="0.6"/>
        <rect x="146" y="106" width="3" height="5" rx="0.6" transform="rotate(20 147.5 108.5)"/>
        <rect x="158" y="118" width="3" height="5" rx="0.6" transform="rotate(40 159.5 120.5)"/>
      </g>

      <!-- Frame indicator line on the curl (one strong frame slit) -->
      <rect x="119" y="74" width="20" height="2.5" rx="0.5" fill="#7a3e00" opacity="0.75"/>
      <rect x="148" y="100" width="14" height="2" rx="0.4" fill="#7a3e00" opacity="0.55" transform="rotate(40 155 101)"/>

      <!-- Specular highlight on the upper fold -->
      <path d="M 86,118
               C 78,90 104,66 138,62
               C 162,60 184,72 192,96"
            stroke="url(#rd-shine)" stroke-width="6"
            fill="none" stroke-linecap="round" opacity="0.9"/>
    </g>
  </g>
</svg>
